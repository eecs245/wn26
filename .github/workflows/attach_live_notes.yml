name: Attach live lecture notes

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      lecture:
        required: true

jobs:
  attach-notes:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install ruamel.yaml

      - name: Attach live notes
        run: python .github/scripts/attach_live_notes.py
        env:
          LECTURE_INPUT: ${{ github.event.inputs.lecture || '' }}

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git commit -m "Attach live notes for lecture"
          git push
