name: Update lecture recording link

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-recording:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: python -m pip install --upgrade pip PyYAML

      - name: Update recording link
        run: python .github/scripts/update_recording_link.py

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _modules
          git commit -m "Add lecture recording link"
          git push
